<!DOCTYPE html>

<html>
<head>
    <title>Movie Recommender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
body {
    background-color: #141414;
}

.movie-card {
    position: relative;
    transition: transform 0.3s ease;
    cursor: pointer;
}

.movie-card img {
    border-radius: 10px;
}

.movie-card:hover {
    transform: scale(1.1);
    z-index: 10;
}

.movie-title {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.7);
    text-align: center;
    padding: 5px;
    font-size: 14px;
    border-radius: 0 0 10px 10px;
}
</style>

</head>

<body class="bg-dark text-white">

<body style="background-color:#141414; color:white; font-family:Arial;">

<div class="container mt-4">

<h1 class="text-center mb-5" style="color:#e50914; font-weight:bold;">
    🎬 Movie Recommender
</h1>

<!-- SEARCH -->
<form method="POST" class="text-center mb-5">
    {% csrf_token %}
    
    <input list="movies" name="movie"
           class="form-control w-50 mx-auto"
           placeholder="Search your movie..."
           style="border-radius:25px; padding:10px;">
    
    <datalist id="movies">
        {% for movie in movies %}
        <option value="{{ movie }}">
        {% endfor %}
    </datalist>

    <button class="btn mt-3"
            style="background:#e50914; color:white; border:none; padding:10px 25px; border-radius:20px;">
        Recommend
    </button>
</form>

{% if results %}
<h3 class="mb-4">Recommended Movies</h3>

<div class="row">
    {% for name, poster in results %}
    <div class="col-md-2 mb-4">
        <div class="movie-card">
            <img src="{{ poster }}" class="img-fluid">
            <div class="movie-title">{{ name }}</div>
        </div>
    </div>
    {% endfor %}
</div>
{% endif %}

</div>

</body>

</body>
</html>
